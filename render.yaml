services:
  - type: web
    name: pixel-math-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "PYTHONPATH=$(pwd)/.. python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://pixel-math.vercel.app  # reemplaza con tu URL de Vercel
